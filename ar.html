<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>LiveCare AR - Karaciger Nakli</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{overflow:hidden;font-family:'Segoe UI',sans-serif;background:#000;}
    #top-bar{position:fixed;top:0;left:0;width:100%;z-index:999;background:rgba(10,10,20,0.88);backdrop-filter:blur(10px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(108,99,255,0.4);}
    .top-title{color:#fff;font-size:15px;font-weight:800;}
    .top-sub{color:#a78bfa;font-size:11px;margin-top:2px;}
    #back-btn{background:rgba(108,99,255,0.25);border:1px solid #6c63ff;color:#c4b5fd;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
    #card-bar{position:fixed;bottom:0;left:0;width:100%;z-index:999;background:rgba(10,10,20,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(108,99,255,0.3);padding:10px 12px 22px;}
    #card-bar-title{color:#64748b;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:8px;}
    #card-btns{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
    #card-btns::-webkit-scrollbar{display:none;}
    .cbt{flex-shrink:0;padding:7px 13px;border-radius:99px;border:1.5px solid rgba(108,99,255,0.35);background:rgba(108,99,255,0.08);color:#cbd5e1;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
    .cbt.active{background:#6c63ff;border-color:#6c63ff;color:#fff;}
    #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:10;pointer-events:none;opacity:0.4;}
    #found-badge{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;padding:7px 20px;border-radius:99px;font-size:13px;font-weight:800;z-index:1000;display:none;box-shadow:0 4px 20px rgba(34,197,94,0.4);}
    #hint-text{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.75);color:#94a3b8;padding:7px 18px;border-radius:99px;font-size:12px;font-weight:600;z-index:10;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);}
    #marker-ref{position:fixed;bottom:140px;right:12px;z-index:999;background:rgba(10,10,20,0.85);border:1px solid rgba(108,99,255,0.4);border-radius:12px;padding:8px;text-align:center;}
    #marker-ref p{color:#64748b;font-size:9px;margin-bottom:4px;font-weight:700;}
    #marker-ref img{width:70px;height:70px;border-radius:6px;}
  </style>
</head>
<body>

<div id="top-bar">
  <div>
    <div class="top-title">Karaciger Nakli AR</div>
    <div class="top-sub">Hiro marker'a kamerayi tut</div>
  </div>
  <a href="index.html" id="back-btn">Ana Ekran</a>
</div>

<div id="found-badge">Marker Algilandi!</div>
<div id="hint-text">Markeri kamera cercevesine al</div>

<svg id="crosshair" width="180" height="180" viewBox="0 0 180 180">
  <rect x="10" y="10" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="10" y="10" width="5"  height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="120" y="10" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="165" y="10" width="5"  height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="10"  y="165" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="10"  y="120" width="5" height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="120" y="165" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="165" y="120" width="5" height="50" rx="2.5" fill="#6c63ff"/>
</svg>

<!-- Marker referans gorseli -->
<div id="marker-ref">
  <p>Bu markeri yazdir</p>
  <img src="https://ar-js-org.github.io/AR.js/data/images/hiro.png" alt="Hiro Marker"/>
</div>

<div id="card-bar">
  <div id="card-bar-title">Gosterilecek AR karti sec</div>
  <div id="card-btns">
    <button class="cbt active" onclick="setCard(0)">Ilac Kullanimi</button>
    <button class="cbt"        onclick="setCard(1)">Beslenme Kurallari</button>
    <button class="cbt"        onclick="setCard(2)">Red Belirtileri</button>
    <button class="cbt"        onclick="setCard(3)">Kacinilacaklar</button>
    <button class="cbt"        onclick="setCard(4)">Egzersiz ve Yasam</button>
    <button class="cbt"        onclick="setCard(5)">Acil Durumlar</button>
  </div>
</div>

<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false; trackingMethod:best;"
  renderer="antialias:true; alpha:true;"
  vr-mode-ui="enabled:false"
  style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;">

  <a-marker preset="hiro" id="hiroMarker">

    <!-- Dis glow cerceve -->
    <a-plane position="0 0.005 0" rotation="-90 0 0" width="4.0" height="2.8" color="#6c63ff" opacity="0.22" material="side:double"></a-plane>

    <!-- Ana kart zemini -->
    <a-plane id="bg" position="0 0.01 0" rotation="-90 0 0" width="3.8" height="2.6" color="#050510" opacity="0.97" material="side:double"></a-plane>

    <!-- Ust renkli baslik blogu (Z negatif = gorsel ust) -->
    <a-plane id="hdr" position="0 0.02 -0.85" rotation="-90 0 0" width="3.8" height="0.7" color="#6c63ff" opacity="1" material="side:double"></a-plane>
    <a-plane position="-1.7 0.03 -0.85" rotation="-90 0 0" width="0.12" height="0.7" color="#ffffff" opacity="0.3" material="side:double"></a-plane>
    <a-text id="t-title"
      value="ILAC KULLANIMI"
      position="0 0.12 -0.85"
      rotation="-90 0 0"
      align="center" color="#ffffff"
      width="3.4" font="roboto"
      letter-spacing="2">
    </a-text>

    <!-- Ayrac cizgi -->
    <a-plane position="0 0.015 -0.42" rotation="-90 0 0" width="3.4" height="0.03" color="#6c63ff" opacity="0.6" material="side:double"></a-plane>

    <!-- Bilgi satirlari -->
    <a-plane position="0 0.015 -0.22" rotation="-90 0 0" width="3.6" height="0.32" color="#0d0d2a" opacity="0.95" material="side:double"></a-plane>
    <a-text id="t-l1" value="Immunsupresif ilaclarinizi her gun" position="0 0.12 -0.22" rotation="-90 0 0" align="center" color="#e2e8f0" width="3.3" font="roboto"></a-text>

    <a-plane id="hl2" position="0 0.015 0.10" rotation="-90 0 0" width="3.6" height="0.32" color="#1a0a00" opacity="0.97" material="side:double"></a-plane>
    <a-text id="t-l2" value="AYNI SAATTE ve AKSATMADAN alin." position="0 0.12 0.10" rotation="-90 0 0" align="center" color="#fbbf24" width="3.3" font="roboto"></a-text>

    <a-plane position="0 0.015 0.42" rotation="-90 0 0" width="3.6" height="0.32" color="#0d0d2a" opacity="0.95" material="side:double"></a-plane>
    <a-text id="t-l3" value="Takrolimus, Siklosporin, Mikofenolat:" position="0 0.12 0.42" rotation="-90 0 0" align="center" color="#94a3b8" width="3.3" font="roboto"></a-text>

    <a-plane position="0 0.015 0.74" rotation="-90 0 0" width="3.6" height="0.32" color="#0d0d2a" opacity="0.95" material="side:double"></a-plane>
    <a-text id="t-l4" value="Atlanan doz organ reddine yol acar!" position="0 0.12 0.74" rotation="-90 0 0" align="center" color="#c4b5fd" width="3.3" font="roboto"></a-text>

    <!-- Alt durum banner (Z pozitif = gorsel alt) -->
    <a-plane id="status-box" position="0 0.02 1.10" rotation="-90 0 0" width="3.8" height="0.46" color="#ef4444" opacity="1" material="side:double"></a-plane>
    <a-plane position="-1.7 0.04 1.10" rotation="-90 0 0" width="0.18" height="0.46" color="#ffffff" opacity="0.25" material="side:double"></a-plane>
    <a-text id="t-status" value="ONEM DERECESI: KRITIK" position="0 0.14 1.10" rotation="-90 0 0" align="center" color="#ffffff" width="3.4" font="roboto" letter-spacing="1"></a-text>

  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<script>
const cards=[
  {title:'ILAC KULLANIMI',l1:'Immunsupresif ilaclarinizi her gun',l2:'AYNI SAATTE ve AKSATMADAN alin.',l3:'Takrolimus, Siklosporin, Mikofenolat:',l4:'Atlanan doz organ reddine yol acar!',status:'ONEM DERECESI: KRITIK',sc:'#ef4444',hc:'#6c63ff',l2c:'#fbbf24'},
  {title:'BESLENME KURALLARI',l1:'Sebze, meyve, tam tahil, az yagly protein.',l2:'GREYFURT KESINLIKLE YASAK! (ilac etkilesimi)',l3:'Alkol, cig yumurta, pastorize edilmemis',l4:'sut urunleri tuketilmemeli.',status:'SAGLIKLI BESLENME ZORUNLU',sc:'#f59e0b',hc:'#f59e0b',l2c:'#f87171'},
  {title:'RED BELIRTILERI',l1:'Ates 38C+, sararma, karyn agrisi,',l2:'siddetli yorgunluk ve idrar kararması.',l3:'Bu belirtiler organ reddinin isareti!',l4:'HEMEN doktorunuzu arayin!',status:'ACIL: 0850 255 9999',sc:'#ef4444',hc:'#dc2626',l2c:'#f87171'},
  {title:'KESINLIKLE KACINILACAKLAR',l1:'ALKOL: Nakledilen karacigeri tahrip eder.',l2:'SIGARA: Bagisiklik sistemini cokertir.',l3:'GREYFURT, cig et ve pastorize edilmemis',l4:'urunler, izinsiz bitki cayi yasak.',status:'BU KURALLARI ASLA IHLAL ETME',sc:'#ef4444',hc:'#7f1d1d',l2c:'#fbbf24'},
  {title:'EGZERSIZ VE YASAM',l1:'Doktor onayli hafif yuruyus yapabilirsin.',l2:'Gunluk 20-30 dk yuruyus idealdir.',l3:'Agir kaldirma ve yorucu spordan kacin.',l4:'Duzensiz uyku bagisiklik sistemini zorlar.',status:'AKTIF VE DUZENLI YAS',sc:'#22c55e',hc:'#10b981',l2c:'#6ee7b7'},
  {title:'ACIL DURUMLAR',l1:'38C+ ates / ani sararma / nefes darligi',l2:'=> HEMEN 112 veya nakil merkezini ara!',l3:'Ameliyat bolgesinde sislik, kirmizilik,',l4:'ani kilo artisi 2kg+/2gun tehlike isareti.',status:'ACIL: 112 | 0850 255 9999',sc:'#ef4444',hc:'#7f1d1d',l2c:'#f87171'}
];
function setCard(idx){
  document.querySelectorAll('.cbt').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const c=cards[idx];
  document.getElementById('t-title').setAttribute('value',c.title);
  document.getElementById('t-l1').setAttribute('value',c.l1);
  document.getElementById('t-l2').setAttribute('value',c.l2);
  document.getElementById('t-l2').setAttribute('color',c.l2c);
  document.getElementById('t-l3').setAttribute('value',c.l3);
  document.getElementById('t-l4').setAttribute('value',c.l4);
  document.getElementById('t-status').setAttribute('value',c.status);
  document.getElementById('status-box').setAttribute('color',c.sc);
  document.getElementById('hdr').setAttribute('color',c.hc);
}
const marker=document.getElementById('hiroMarker');
const badge=document.getElementById('found-badge');
const hint=document.getElementById('hint-text');
marker.addEventListener('markerFound',()=>{
  badge.style.display='block';hint.style.display='none';
  if(navigator.vibrate)navigator.vibrate([60,30,60]);
  setTimeout(()=>{badge.style.display='none';},2200);
});
marker.addEventListener('markerLost',()=>{hint.style.display='block';});
</script>
</body>
</html>
