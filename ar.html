<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>LiveCare AR - Karaciger Nakli</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;background:#000;height:100dvh;width:100vw;}

    /* Kamera arka plan */
    #video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;}

    /* Üst bar */
    #top-bar{position:fixed;top:0;left:0;width:100%;z-index:99;background:rgba(5,5,20,0.82);backdrop-filter:blur(14px);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(108,99,255,0.4);}
    .top-title{color:#fff;font-size:15px;font-weight:800;}
    .top-sub{color:#a78bfa;font-size:11px;margin-top:2px;}
    #back-btn{background:rgba(108,99,255,0.28);border:1.5px solid #6c63ff;color:#c4b5fd;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}

    /* Kart — orta ekranda yüzer */
    #ar-card{
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      z-index:10;
      width:min(94vw,440px);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.7), 0 0 0 2px var(--hc,#6c63ff);
      backdrop-filter:blur(2px);
      animation:floatIn .35s cubic-bezier(.22,1,.36,1);
    }
    @keyframes floatIn{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}

    /* Header */
    #card-header{
      background:var(--hc,#6c63ff);
      padding:18px 20px 16px;
      position:relative;
    }
    #card-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:10px;background:rgba(255,255,255,0.22);}
    #card-icon{font-size:28px;margin-bottom:4px;}
    #card-title{color:#fff;font-size:22px;font-weight:900;letter-spacing:.5px;line-height:1.1;}

    /* İçerik */
    #card-body{background:rgba(7,7,26,0.97);padding:4px 0 0;}

    .card-line{
      display:flex;align-items:center;gap:12px;
      padding:13px 18px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .card-line:last-child{border-bottom:none;}
    .line-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .line-text{font-size:15px;font-weight:500;line-height:1.35;}

    /* Status banner */
    #card-status{
      background:var(--sc,#ef4444);
      padding:12px 18px;
      display:flex;align-items:center;gap:10px;
    }
    #card-status::before{content:'';width:10px;height:100%;position:absolute;left:0;background:rgba(255,255,255,0.2);}
    #status-text{color:#fff;font-size:14px;font-weight:800;letter-spacing:.4px;}

    /* Alt buton barı */
    #card-bar{
      position:fixed;bottom:0;left:0;width:100%;z-index:99;
      background:rgba(5,5,20,0.92);backdrop-filter:blur(14px);
      border-top:1px solid rgba(108,99,255,0.28);
      padding:10px 12px 26px;
    }
    #card-bar-title{color:#475569;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:8px;}
    #card-btns{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
    #card-btns::-webkit-scrollbar{display:none;}
    .cbt{flex-shrink:0;padding:8px 14px;border-radius:99px;border:1.5px solid rgba(108,99,255,0.3);background:rgba(108,99,255,0.07);color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .18s;}
    .cbt.active{background:#6c63ff;border-color:#6c63ff;color:#fff;box-shadow:0 2px 12px rgba(108,99,255,0.4);}

    /* Kamera izin ekranı */
    #cam-prompt{position:fixed;inset:0;z-index:200;background:rgba(5,5,20,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
    #cam-prompt h2{color:#fff;font-size:20px;font-weight:800;text-align:center;}
    #cam-prompt p{color:#94a3b8;font-size:14px;text-align:center;line-height:1.5;}
    #cam-btn{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;border:none;padding:14px 32px;border-radius:99px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,0.4);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div id="top-bar">
  <div>
    <div class="top-title">Karaciger Nakli AR</div>
    <div class="top-sub">Kamera uzerinde bilgi karti</div>
  </div>
  <a href="index.html" id="back-btn">Ana Ekran</a>
</div>

<!-- AR Bilgi Kartı -->
<div id="ar-card">
  <div id="card-header">
    <div id="card-icon"></div>
    <div id="card-title">ILAC KULLANIMI</div>
  </div>
  <div id="card-body">
    <!-- JS ile doldurulacak -->
  </div>
  <div id="card-status" style="position:relative;">
    <span id="status-text">ONEM DERECESI: KRITIK</span>
  </div>
</div>

<!-- Alt buton barı -->
<div id="card-bar">
  <div id="card-bar-title">Gosterilecek karti sec</div>
  <div id="card-btns">
    <button class="cbt active" onclick="setCard(0)">Ilac Kullanimi</button>
    <button class="cbt"        onclick="setCard(1)">Beslenme</button>
    <button class="cbt"        onclick="setCard(2)">Red Belirtileri</button>
    <button class="cbt"        onclick="setCard(3)">Kacinilacaklar</button>
    <button class="cbt"        onclick="setCard(4)">Egzersiz</button>
    <button class="cbt"        onclick="setCard(5)">Acil Durumlar</button>
  </div>
</div>

<!-- Kamera izin ekranı -->
<div id="cam-prompt">
  <h2>Kamera Erisimi</h2>
  <p>AR deneyimi icin kameranizi kullanmamiza izin verin. Hicbir veri kaydedilmez.</p>
  <button id="cam-btn" onclick="startCamera()">Kamerayi Ac</button>
</div>

<script>
const cards = [
  {
    title: 'ILAC KULLANIMI',
    icon: '',
    hc: '#6c63ff', sc: '#ef4444',
    lines: [
      {text: 'Immunsupresif ilaclarinizi her gun', color: '#e2e8f0'},
      {text: 'AYNI SAATTE ve AKSATMADAN alin.', color: '#fbbf24'},
      {text: 'Takrolimus - Siklosporin - Mikofenolat', color: '#a78bfa'},
      {text: 'Atlanan doz organ reddine yol acar!', color: '#f87171'},
    ],
    status: 'ONEM DERECESI: KRITIK',
  },
  {
    title: 'BESLENME KURALLARI',
    icon: '',
    hc: '#d97706', sc: '#b45309',
    lines: [
      {text: 'Sebze, meyve, tam tahil, az yagly protein.', color: '#e2e8f0'},
      {text: 'GREYFURT KESINLIKLE YASAK!', color: '#f87171'},
      {text: 'Alkol ve cig et kesinlikle tuketme.', color: '#fbbf24'},
      {text: 'Pastorize edilmemis sut urunleri yasak.', color: '#94a3b8'},
    ],
    status: 'SAGLIKLI BESLENME ZORUNLU',
  },
  {
    title: 'RED BELIRTILERI',
    icon: '',
    hc: '#dc2626', sc: '#b91c1c',
    lines: [
      {text: 'Ates 38C+, sararma, karin agrisi,', color: '#fca5a5'},
      {text: 'siddetli yorgunluk, idrar kararması.', color: '#f87171'},
      {text: 'Bu belirtiler organ reddinin isareti!', color: '#fbbf24'},
      {text: 'HEMEN doktorunuzu arayin!', color: '#ff6b6b'},
    ],
    status: 'ACIL: 0850 255 9999',
  },
  {
    title: 'KACINILACAKLAR',
    icon: '',
    hc: '#7f1d1d', sc: '#991b1b',
    lines: [
      {text: 'ALKOL: Nakledilen karacigeri tahrip eder.', color: '#f87171'},
      {text: 'SIGARA: Bagisiklik sistemini cokertir.', color: '#fbbf24'},
      {text: 'GREYFURT ve cig et kesinlikle yasak.', color: '#fca5a5'},
      {text: 'Izinsiz bitki cayi ve takviye alma.', color: '#94a3b8'},
    ],
    status: 'BU KURALLARI ASLA IHLAL ETME',
  },
  {
    title: 'EGZERSIZ VE YASAM',
    icon: '',
    hc: '#047857', sc: '#059669',
    lines: [
      {text: 'Doktor onayli hafif yuruyus yap.', color: '#e2e8f0'},
      {text: 'Gunluk 20-30 dk yuruyus idealdir.', color: '#6ee7b7'},
      {text: 'Agir kaldirma ve yorucu spordan kacin.', color: '#94a3b8'},
      {text: 'Duzensiz uyku bagisiklik sistemini zorlar.', color: '#fbbf24'},
    ],
    status: 'AKTIF VE DUZENLI YAS',
  },
  {
    title: 'ACIL DURUMLAR',
    icon: '',
    hc: '#7f1d1d', sc: '#ef4444',
    lines: [
      {text: '38C+ ates / ani sararma / nefes darligi', color: '#f87171'},
      {text: '=> HEMEN 112 veya nakil merkezini ara!', color: '#fbbf24'},
      {text: 'Ameliyat bolgesinde sislik, kirmizilik,', color: '#fca5a5'},
      {text: 'Ani kilo artisi 2kg+/2gun tehlike isareti.', color: '#e2e8f0'},
    ],
    status: 'ACIL: 112  |  0850 255 9999',
  },
];

function setCard(idx) {
  document.querySelectorAll('.cbt').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const c = cards[idx];

  // CSS değişkenlerini güncelle
  document.getElementById('ar-card').style.setProperty('--hc', c.hc);
  document.getElementById('ar-card').style.setProperty('--sc', c.sc);
  document.getElementById('card-header').style.background = c.hc;
  document.getElementById('card-status').style.background = c.sc;

  document.getElementById('card-icon').textContent  = c.icon;
  document.getElementById('card-title').textContent = c.title;
  document.getElementById('status-text').textContent = c.status;

  // Satırları oluştur
  const body = document.getElementById('card-body');
  body.innerHTML = c.lines.map(l => `
    <div class="card-line">
      <div class="line-dot" style="background:${l.color};box-shadow:0 0 6px ${l.color}88;"></div>
      <div class="line-text" style="color:${l.color};">${l.text}</div>
    </div>
  `).join('');

  // Animasyon tekrarla
  const card = document.getElementById('ar-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'floatIn .3s cubic-bezier(.22,1,.36,1)';
}

// Kamera aç
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('cam-prompt').style.display = 'none';
  } catch(e) {
    // Kamera yoksa sadece prompt'u kapat, koyu arka planla devam et
    document.getElementById('cam-prompt').style.display = 'none';
    document.body.style.background = '#07071a';
  }
}

// Başlangıçta ilk kartı yükle
setCard(0);
</script>
</body>
</html>
