<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>LiveCare AR - Karaciger Nakli</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{overflow:hidden;font-family:'Segoe UI',sans-serif;background:#000;}
    #top-bar{position:fixed;top:0;left:0;width:100%;z-index:999;background:rgba(10,10,20,0.88);backdrop-filter:blur(10px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(108,99,255,0.4);}
    .top-title{color:#fff;font-size:15px;font-weight:800;}
    .top-sub{color:#a78bfa;font-size:11px;margin-top:2px;}
    #back-btn{background:rgba(108,99,255,0.25);border:1px solid #6c63ff;color:#c4b5fd;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
    #card-bar{position:fixed;bottom:0;left:0;width:100%;z-index:999;background:rgba(10,10,20,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(108,99,255,0.3);padding:10px 12px 22px;}
    #card-bar-title{color:#64748b;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:8px;}
    #card-btns{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
    #card-btns::-webkit-scrollbar{display:none;}
    .cbt{flex-shrink:0;padding:7px 13px;border-radius:99px;border:1.5px solid rgba(108,99,255,0.35);background:rgba(108,99,255,0.08);color:#cbd5e1;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
    .cbt.active{background:#6c63ff;border-color:#6c63ff;color:#fff;}
    #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:10;pointer-events:none;opacity:0.4;}
    #found-badge{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;padding:7px 20px;border-radius:99px;font-size:13px;font-weight:800;z-index:1000;display:none;box-shadow:0 4px 20px rgba(34,197,94,0.4);}
    #hint-text{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.75);color:#94a3b8;padding:7px 18px;border-radius:99px;font-size:12px;font-weight:600;z-index:10;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);}
    #marker-ref{position:fixed;bottom:140px;right:12px;z-index:999;background:rgba(10,10,20,0.85);border:1px solid rgba(108,99,255,0.4);border-radius:12px;padding:8px;text-align:center;}
    #marker-ref p{color:#64748b;font-size:9px;margin-bottom:4px;font-weight:700;}
    #marker-ref img{width:70px;height:70px;border-radius:6px;}
  </style>
</head>
<body>

<div id="top-bar">
  <div>
    <div class="top-title">Karaciger Nakli AR</div>
    <div class="top-sub">Hiro marker'a kamerayi tut</div>
  </div>
  <a href="index.html" id="back-btn">Ana Ekran</a>
</div>

<div id="found-badge">Marker Algilandi!</div>
<div id="hint-text">Markeri kamera cercevesine al</div>

<svg id="crosshair" width="180" height="180" viewBox="0 0 180 180">
  <rect x="10" y="10" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="10" y="10" width="5"  height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="120" y="10" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="165" y="10" width="5"  height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="10"  y="165" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="10"  y="120" width="5" height="50" rx="2.5" fill="#6c63ff"/>
  <rect x="120" y="165" width="50" height="5" rx="2.5" fill="#6c63ff"/>
  <rect x="165" y="120" width="5" height="50" rx="2.5" fill="#6c63ff"/>
</svg>

<div id="marker-ref">
  <p>Bu markeri yazdir</p>
  <img src="https://ar-js-org.github.io/AR.js/data/images/hiro.png" alt="Hiro Marker"/>
</div>

<div id="card-bar">
  <div id="card-bar-title">Gosterilecek AR karti sec</div>
  <div id="card-btns">
    <button class="cbt active" onclick="setCard(0)">Ilac Kullanimi</button>
    <button class="cbt"        onclick="setCard(1)">Beslenme Kurallari</button>
    <button class="cbt"        onclick="setCard(2)">Red Belirtileri</button>
    <button class="cbt"        onclick="setCard(3)">Kacinilacaklar</button>
    <button class="cbt"        onclick="setCard(4)">Egzersiz ve Yasam</button>
    <button class="cbt"        onclick="setCard(5)">Acil Durumlar</button>
  </div>
</div>

<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false; trackingMethod:best;"
  renderer="antialias:true; alpha:true;"
  vr-mode-ui="enabled:false"
  style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;">

  <a-assets>
    <canvas id="arCanvas" width="1024" height="680"></canvas>
  </a-assets>

  <a-marker preset="hiro" id="hiroMarker">
    <a-plane id="cardPlane"
      position="0 0.01 0"
      rotation="-90 0 0"
      width="3.8" height="2.55"
      material="src:#arCanvas; transparent:true; side:double;">
    </a-plane>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const cards = [
  {
    title: 'ILAC KULLANIMI',
    lines: [
      {text: 'Immunsupresif ilaclarinizi her gun', color: '#e2e8f0'},
      {text: 'AYNI SAATTE ve AKSATMADAN alin.', color: '#fbbf24'},
      {text: 'Takrolimus - Siklosporin - Mikofenolat', color: '#94a3b8'},
      {text: 'Atlanan doz organ reddine yol acar!', color: '#c4b5fd'},
    ],
    status: 'ONEM DERECESI: KRITIK',
    headerColor: '#6c63ff',
    statusColor: '#ef4444',
  },
  {
    title: 'BESLENME KURALLARI',
    lines: [
      {text: 'Sebze, meyve, tam tahil, az yagly protein.', color: '#e2e8f0'},
      {text: 'GREYFURT KESINLIKLE YASAK!', color: '#f87171'},
      {text: 'Alkol ve cig et kesinlikle tuketme.', color: '#94a3b8'},
      {text: 'Pastorize edilmemis sut urunleri yasak.', color: '#fbbf24'},
    ],
    status: 'SAGLIKLI BESLENME ZORUNLU',
    headerColor: '#f59e0b',
    statusColor: '#d97706',
  },
  {
    title: 'RED BELIRTILERI',
    lines: [
      {text: 'Ates 38C+, sararma, karin agrisi,', color: '#e2e8f0'},
      {text: 'siddetli yorgunluk, idrar kararması.', color: '#f87171'},
      {text: 'Bu belirtiler organ reddinin isareti!', color: '#94a3b8'},
      {text: 'HEMEN doktorunuzu arayin!', color: '#f87171'},
    ],
    status: 'ACIL: 0850 255 9999',
    headerColor: '#dc2626',
    statusColor: '#ef4444',
  },
  {
    title: 'KESINLIKLE KACINILACAKLAR',
    lines: [
      {text: 'ALKOL: Nakledilen karacigeri tahrip eder.', color: '#f87171'},
      {text: 'SIGARA: Bagisiklik sistemini cokertir.', color: '#fbbf24'},
      {text: 'GREYFURT ve cig et kesinlikle yasak.', color: '#94a3b8'},
      {text: 'Izinsiz bitki cayi ve takviye kullanma.', color: '#e2e8f0'},
    ],
    status: 'BU KURALLARI ASLA IHLAL ETME',
    headerColor: '#991b1b',
    statusColor: '#ef4444',
  },
  {
    title: 'EGZERSIZ VE YASAM',
    lines: [
      {text: 'Doktor onayli hafif yuruyus yapabilirsin.', color: '#e2e8f0'},
      {text: 'Gunluk 20-30 dk yuruyus idealdir.', color: '#6ee7b7'},
      {text: 'Agir kaldirma ve yorucu spordan kacin.', color: '#94a3b8'},
      {text: 'Duzensiz uyku bagisiklik sistemini zorlar.', color: '#fbbf24'},
    ],
    status: 'AKTIF VE DUZENLI YAS',
    headerColor: '#059669',
    statusColor: '#22c55e',
  },
  {
    title: 'ACIL DURUMLAR',
    lines: [
      {text: '38C+ ates / ani sararma / nefes darligi', color: '#f87171'},
      {text: '=> HEMEN 112 veya nakil merkezini ara!', color: '#fbbf24'},
      {text: 'Ameliyat bolgesinde sislik ve kirmizilik,', color: '#94a3b8'},
      {text: 'Ani kilo artisi 2kg+/2gun tehlike isareti.', color: '#e2e8f0'},
    ],
    status: 'ACIL: 112  |  0850 255 9999',
    headerColor: '#991b1b',
    statusColor: '#ef4444',
  },
];

const W = 1024, H = 680;
const canvas = document.getElementById('arCanvas');
const ctx = canvas.getContext('2d');

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

function drawCard(card) {
  ctx.clearRect(0, 0, W, H);

  // Arkaplan
  roundRect(ctx, 0, 0, W, H, 24);
  ctx.fillStyle = '#07071a';
  ctx.fill();

  // Kenar cerceve
  roundRect(ctx, 3, 3, W-6, H-6, 22);
  ctx.strokeStyle = card.headerColor;
  ctx.lineWidth = 5;
  ctx.globalAlpha = 0.8;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Header gradient
  const hg = ctx.createLinearGradient(0, 0, W, 130);
  hg.addColorStop(0, card.headerColor);
  hg.addColorStop(1, card.headerColor + 'bb');
  ctx.fillStyle = hg;
  roundRect(ctx, 0, 0, W, 130, 24);
  ctx.fill();
  ctx.fillRect(0, 100, W, 30);

  // Header sol accent
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillRect(0, 0, 14, 130);

  // Baslik
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 56px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(card.title, W/2, 67);

  // Ayrac
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30,140); ctx.lineTo(W-30,140); ctx.stroke();

  // Satirlar
  const lineH = 104;
  const startY = 152;
  card.lines.forEach((line, i) => {
    const y = startY + i * lineH;
    // Satir arka
    roundRect(ctx, 18, y, W-36, lineH-10, 10);
    ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,0.045)' : 'rgba(0,0,0,0.22)';
    ctx.fill();
    // Sol renk bar
    ctx.fillStyle = line.color;
    ctx.globalAlpha = 0.9;
    ctx.fillRect(18, y, 7, lineH-10);
    ctx.globalAlpha = 1;
    // Metin
    ctx.fillStyle = line.color;
    ctx.font = '500 38px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(line.text, W/2+4, y + (lineH-10)/2);
  });

  // Status banner
  const sbY = H - 82;
  ctx.fillStyle = card.statusColor;
  ctx.fillRect(0, sbY, W, 82);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,sbY); ctx.lineTo(W,sbY); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0, sbY, 14, 82);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 40px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(card.status, W/2, sbY + 41);

  // Three.js texture guncelle
  const plane = document.getElementById('cardPlane');
  if (plane) {
    const mesh = plane.getObject3D('mesh');
    if (mesh && mesh.material && mesh.material.map) {
      mesh.material.map.needsUpdate = true;
    }
  }
}

let currentIdx = 0;
function setCard(idx) {
  currentIdx = idx;
  document.querySelectorAll('.cbt').forEach((b,i) => b.classList.toggle('active', i===idx));
  drawCard(cards[idx]);
}

document.querySelector('a-scene').addEventListener('loaded', () => {
  drawCard(cards[0]);
  setInterval(() => {
    const plane = document.getElementById('cardPlane');
    if (plane) {
      const mesh = plane.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.needsUpdate = true;
      }
    }
  }, 200);
});

const marker = document.getElementById('hiroMarker');
const badge  = document.getElementById('found-badge');
const hint   = document.getElementById('hint-text');
marker.addEventListener('markerFound', () => {
  badge.style.display = 'block';
  hint.style.display  = 'none';
  if(navigator.vibrate) navigator.vibrate([60,30,60]);
  setTimeout(() => { badge.style.display='none'; }, 2200);
  drawCard(cards[currentIdx]);
});
marker.addEventListener('markerLost', () => { hint.style.display='block'; });
</script>
</body>
</html>
