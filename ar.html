<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>LiveCare AR - Arttirilmis Gerceklik</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family:'Segoe UI',sans-serif; }

    #ui-overlay {
      position:fixed; top:0; left:0; width:100%; z-index:999;
      display:flex; flex-direction:column; align-items:center; gap:0;
    }

    #top-bar {
      width:100%; background:rgba(15,15,26,0.85);
      backdrop-filter:blur(10px);
      padding:12px 20px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(108,99,255,0.3);
    }
    #top-bar h1 { color:#fff; font-size:16px; font-weight:800; }
    #top-bar span { color:#a78bfa; font-size:12px; }
    #back-btn {
      background:rgba(108,99,255,0.2); border:1px solid #6c63ff;
      color:#a78bfa; padding:7px 14px; border-radius:99px;
      font-size:13px; font-weight:700; cursor:pointer; text-decoration:none;
    }

    #instruction-box {
      margin-top:10px;
      background:rgba(15,15,26,0.8); backdrop-filter:blur(8px);
      border:1px solid rgba(108,99,255,0.3); border-radius:16px;
      padding:10px 20px; color:#e2e8f0; font-size:13px; text-align:center;
      max-width:340px;
    }
    #instruction-box strong { color:#a78bfa; }

    #card-selector {
      position:fixed; bottom:0; left:0; width:100%; z-index:999;
      background:rgba(15,15,26,0.9); backdrop-filter:blur(10px);
      border-top:1px solid rgba(108,99,255,0.3);
      padding:12px 16px 20px;
    }
    #card-selector p {
      color:#94a3b8; font-size:11px; text-align:center; margin-bottom:8px; font-weight:700;
      text-transform:uppercase; letter-spacing:1px;
    }
    #card-btns {
      display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
    }
    .card-btn {
      flex-shrink:0; padding:8px 14px; border-radius:99px;
      border:1.5px solid rgba(108,99,255,0.4);
      background:rgba(108,99,255,0.1); color:#e2e8f0;
      font-size:12px; font-weight:700; cursor:pointer;
      transition:all 0.2s;
      white-space:nowrap;
    }
    .card-btn.active { background:#6c63ff; border-color:#6c63ff; color:#fff; }

    #marker-hint {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      z-index:998; pointer-events:none;
    }
    #marker-hint svg { opacity:0.35; }

    #detected-badge {
      position:fixed; top:80px; left:50%; transform:translateX(-50%);
      background:#22c55e; color:#fff; padding:6px 18px; border-radius:99px;
      font-size:13px; font-weight:800; z-index:1000;
      display:none; animation:pop 0.3s ease;
    }
    @keyframes pop { from{transform:translateX(-50%) scale(0.8)} to{transform:translateX(-50%) scale(1)} }
  </style>
</head>
<body>

<!-- UI -->
<div id="ui-overlay">
  <div id="top-bar">
    <div>
      <h1>LiveCare AR</h1>
      <span>Markere kamerani tut</span>
    </div>
    <a href="index.html" id="back-btn">Ana Ekran</a>
  </div>
  <div id="instruction-box">
    Asagidaki <strong>Hiro Marker</strong> kagidini yazdir veya ekranda goster,<br/>
    kamerani tut ve bilgi karti goster.
  </div>
</div>

<div id="detected-badge">Marker Algilandi!</div>

<!-- Marker crosshair -->
<div id="marker-hint">
  <svg width="200" height="200" viewBox="0 0 200 200">
    <rect x="20" y="20" width="60" height="6" rx="3" fill="#6c63ff"/>
    <rect x="20" y="20" width="6" height="60" rx="3" fill="#6c63ff"/>
    <rect x="120" y="20" width="60" height="6" rx="3" fill="#6c63ff"/>
    <rect x="174" y="20" width="6" height="60" rx="3" fill="#6c63ff"/>
    <rect x="20" y="174" width="60" height="6" rx="3" fill="#6c63ff"/>
    <rect x="20" y="120" width="6" height="60" rx="3" fill="#6c63ff"/>
    <rect x="120" y="174" width="60" height="6" rx="3" fill="#6c63ff"/>
    <rect x="174" y="120" width="6" height="60" rx="3" fill="#6c63ff"/>
  </svg>
</div>

<!-- Kart secici -->
<div id="card-selector">
  <p>Gosterilecek kart</p>
  <div id="card-btns">
    <button class="card-btn active" onclick="setCard(0)">Ilac Bilgisi</button>
    <button class="card-btn"        onclick="setCard(1)">Beslenme</button>
    <button class="card-btn"        onclick="setCard(2)">Hijyen</button>
    <button class="card-btn"        onclick="setCard(3)">Acil Belirtiler</button>
    <button class="card-btn"        onclick="setCard(4)">Egzersiz</button>
    <button class="card-btn"        onclick="setCard(5)">Kontrol</button>
  </div>
</div>

<!-- A-FRAME AR SAHNE -->
<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false; detectionMode:mono_and_matrix; matrixCodeType:3x3;"
  renderer="logarithmicDepthBuffer:true; antialias:true;"
  vr-mode-ui="enabled:false"
  style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;">

  <!-- HIRO MARKER -->
  <a-marker preset="hiro" id="hiroMarker">

    <!-- PANEL ARKAPLAN -->
    <a-plane
      id="ar-bg"
      position="0 0.5 0"
      rotation="-90 0 0"
      width="3.2" height="2"
      color="#0f0f1a"
      opacity="0.92"
      material="side:double">
    </a-plane>

    <!-- BASLIK CUBUGU -->
    <a-plane
      id="ar-header"
      position="0 0.51 0.7"
      rotation="-90 0 0"
      width="3.2" height="0.5"
      color="#6c63ff"
      opacity="1"
      material="side:double">
    </a-plane>

    <!-- BASLIK METIN -->
    <a-text
      id="ar-title"
      value="ILAC BILGISI"
      position="0 0.52 0.7"
      rotation="-90 0 0"
      align="center"
      color="#ffffff"
      width="3"
      font="roboto">
    </a-text>

    <!-- ICERIK METIN 1 -->
    <a-text
      id="ar-line1"
      value="Ilaclarinizi her gun ayni saatte alin."
      position="0 0.52 0.2"
      rotation="-90 0 0"
      align="center"
      color="#e2e8f0"
      width="2.8"
      font="roboto">
    </a-text>

    <!-- ICERIK METIN 2 -->
    <a-text
      id="ar-line2"
      value="Hic atlamamayin!"
      position="0 0.52 -0.1"
      rotation="-90 0 0"
      align="center"
      color="#a78bfa"
      width="2.8"
      font="roboto">
    </a-text>

    <!-- ICERIK METIN 3 -->
    <a-text
      id="ar-line3"
      value="Doktorunuzla iletisimde kalin."
      position="0 0.52 -0.4"
      rotation="-90 0 0"
      align="center"
      color="#94a3b8"
      width="2.8"
      font="roboto">
    </a-text>

    <!-- DURUM KUTUSU -->
    <a-plane
      id="ar-status-box"
      position="0 0.52 -0.75"
      rotation="-90 0 0"
      width="2.5" height="0.35"
      color="#22c55e"
      opacity="0.85"
      material="side:double">
    </a-plane>

    <a-text
      id="ar-status"
      value="ONEMLI HATIRLATMA"
      position="0 0.53 -0.75"
      rotation="-90 0 0"
      align="center"
      color="#ffffff"
      width="2.4"
      font="roboto">
    </a-text>

    <!-- ANIMASYONLU CERCEVE -->
    <a-plane
      position="0 0.49 0.5"
      rotation="-90 0 0"
      width="3.4" height="2.2"
      color="#6c63ff"
      opacity="0.15"
      material="side:double">
      <a-animation attribute="opacity" from="0.05" to="0.25" dur="1500" repeat="indefinite" direction="alternate"></a-animation>
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const cards = [
    {
      title:'ILAC BILGISI',
      line1:'Ilaclarinizi her gun ayni saatte alin.',
      line2:'Hic atlamamayin!',
      line3:'Doktorunuzla iletisimde kalin.',
      status:'ONEMLI HATIRLATMA',
      color:'#22c55e',
      headerColor:'#6c63ff'
    },
    {
      title:'BESLENME',
      line1:'Sebze, meyve ve tam tahil tuketin.',
      line2:'Greyfurt ve alkol kesinlikle yasak!',
      line3:'Az tuzlu, az yagly beslenin.',
      status:'SAGLIKLI BESLENME',
      color:'#22c55e',
      headerColor:'#f59e0b'
    },
    {
      title:'HIJYEN KURALLARI',
      line1:'Ellerinizi sik sik yikayin.',
      line2:'Kalabalik ortamlardan uzak durun.',
      line3:'Maske takin, pencereleri havalandirin.',
      status:'ENFEKSIYONDAN KORUNUN',
      color:'#4a9eff',
      headerColor:'#06b6d4'
    },
    {
      title:'ACIL BELIRTILER',
      line1:'38 derece ve uzeri ates - hemen arayin!',
      line2:'Sararma, siddetli karyn agrisi,',
      line3:'nefes darligi: 112 veya doktorunuz.',
      status:'ACIL: 112',
      color:'#ef4444',
      headerColor:'#ef4444'
    },
    {
      title:'EGZERSIZ',
      line1:'Doktor onayli yuruyus yapabilirsiniz.',
      line2:'Agir kaldirmaktan kacinin.',
      line3:'Gunluk hafif hareket iyilesmeyi hizlandirir.',
      status:'AKTIF KALIN',
      color:'#a855f7',
      headerColor:'#a855f7'
    },
    {
      title:'KONTROL RANDEVULARI',
      line1:'Duzenli tahlil ve muayenelere gidin.',
      line2:'Kan kreatinin, ALT, AST takip edilmeli.',
      line3:'Hicbir semptomu atlamayin.',
      status:'KONTROLLERI ATLAMA',
      color:'#f59e0b',
      headerColor:'#f59e0b'
    }
  ];

  let current = 0;

  function setCard(idx){
    current = idx;
    document.querySelectorAll('.card-btn').forEach((b,i)=>{
      b.classList.toggle('active', i===idx);
    });
    const c = cards[idx];
    document.getElementById('ar-title').setAttribute('value', c.title);
    document.getElementById('ar-line1').setAttribute('value', c.line1);
    document.getElementById('ar-line2').setAttribute('value', c.line2);
    document.getElementById('ar-line3').setAttribute('value', c.line3);
    document.getElementById('ar-status').setAttribute('value', c.status);
    document.getElementById('ar-status-box').setAttribute('color', c.color);
    document.getElementById('ar-header').setAttribute('color', c.headerColor);
  }

  // Marker algılama olayları
  const marker = document.getElementById('hiroMarker');
  const badge  = document.getElementById('detected-badge');
  const hint   = document.getElementById('marker-hint');

  marker.addEventListener('markerFound', () => {
    badge.style.display = 'block';
    hint.style.display  = 'none';
    setTimeout(()=>{ badge.style.display='none'; }, 2000);
    if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
  });

  marker.addEventListener('markerLost', () => {
    hint.style.display = 'block';
  });
</script>
</body>
</html>
